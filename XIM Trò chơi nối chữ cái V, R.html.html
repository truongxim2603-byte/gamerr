<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Nối Đúng Chữ Cái V - R</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #7dd3fc 0%, #86efac 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container { 
            width: 90vw; 
            max-width: 1000px; 
            aspect-ratio: 16/9; 
            position: relative; 
            padding: 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 30px;
            margin-top: 10px;
            display: flex;
            gap: 20px;
        }
        .item-card { 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            background: white;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .item-card.selected { box-shadow: 0 0 20px 5px #f59e0b; transform: scale(1.05); border-color: #f59e0b !important; }
        .item-card.matched { border-color: #22c55e !important; background-color: #f0fdf4 !important; opacity: 0.8; cursor: default; }
        .connecting { stroke: #ea580c; stroke-width: 6; stroke-linecap: round; fill: none; pointer-events: none; }
        #start-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-2 text-gray-800">

    <div id="start-overlay">
        <button onclick="startGame()" class="bg-yellow-400 text-white text-4xl px-12 py-6 rounded-3xl font-black shadow-xl hover:scale-105 transition-transform border-b-8 border-yellow-600">
            BẮT ĐẦU CHƠI
        </button>
    </div>

    <header class="text-center my-2">
        <h1 class="text-3xl md:text-4xl font-black text-white drop-shadow-lg uppercase tracking-wider">BÉ NỐI ĐÚNG CHỮ CÁI V - R</h1>
        <div class="mt-2 bg-white/90 px-6 py-2 rounded-full inline-block text-lg font-bold text-orange-600 shadow-lg">
            Ngôi sao: <span id="star-count">0</span> / 8
        </div>
    </header>

    <main class="game-container">
        <svg id="svg-layer" class="absolute inset-0 w-full h-full pointer-events-none z-10"></svg>
        
        <div id="left-col" class="w-1/2 flex flex-col justify-between h-full gap-2"></div>
        <div id="right-col" class="w-1/2 flex flex-col justify-between h-full gap-2"></div>
    </main>

    <div id="win-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl text-center shadow-2xl max-w-sm">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold text-yellow-500 mb-2">Tuyệt vời!</h2>
            <p class="text-gray-600 mb-6">Bé đã tìm đúng các chữ cái V và R.</p>
            <button onclick="location.reload()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold hover:scale-105 transition-transform">Chơi lại</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, duration, type = 'sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function startGame() {
            // Đảm bảo audio context được khởi động
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Ẩn overlay
            document.getElementById('start-overlay').style.display = 'none';
            
            // Chơi nhạc chào mừng
            playTone(440, 0.5, 'triangle');
        }

        const gameData = [
            { id: 'v1', char: 'V', type: 'v', label: 'Voi', icon: '🐘' },
            { id: 'v2', char: 'v', type: 'v', label: 'Vườn hoa', icon: '🌻' },
            { id: 'v3', char: 'V', type: 'v', label: 'Viên bi', icon: '🔵' },
            { id: 'v4', char: 'v', type: 'v', label: 'Vịt', icon: '🦆' },
            { id: 'r1', char: 'R', type: 'r', label: 'Rổ rá', icon: '🧺' },
            { id: 'r2', char: 'r', type: 'r', label: 'Rồng', icon: '🐉' },
            { id: 'r3', char: 'R', type: 'r', label: 'Rau', icon: '🥬' },
            { id: 'r4', char: 'r', type: 'r', label: 'Rừng cây', icon: '🌲' }
        ];

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
        
        const leftCol = document.getElementById('left-col');
        const rightCol = document.getElementById('right-col');
        const svgLayer = document.getElementById('svg-layer');
        let score = 0;
        let selectedItem = null;

        function createCard(item, isLeft) {
            const div = document.createElement('div');
            div.className = "item-card p-3 h-[11%]";
            if (isLeft) {
                div.innerHTML = `<div class="w-full text-center text-4xl md:text-5xl font-black text-blue-600">${item.char}</div>`;
            } else {
                div.innerHTML = `<span class="text-3xl md:text-4xl ml-2 mr-4">${item.icon}</span><span class="text-lg md:text-xl font-bold text-gray-700">${item.label}</span>`;
            }
            div.dataset.type = item.type;
            div.dataset.id = item.id;
            div.onclick = () => selectItem(div);
            return div;
        }

        function init() {
            shuffle([...gameData]).forEach(item => leftCol.appendChild(createCard(item, true)));
            shuffle([...gameData]).forEach(item => rightCol.appendChild(createCard(item, false)));
        }

        function selectItem(el) {
            if (el.classList.contains('matched')) return;
            if (selectedItem === el) { el.classList.remove('selected'); selectedItem = null; return; }

            if (!selectedItem) {
                selectedItem = el;
                el.classList.add('selected');
                playTone(500, 0.1);
            } else {
                if (selectedItem.parentElement !== el.parentElement && selectedItem.dataset.type === el.dataset.type) {
                    playTone(880, 0.3);
                    drawLine(selectedItem, el);
                    selectedItem.classList.remove('selected');
                    selectedItem.classList.add('matched');
                    el.classList.add('matched');
                    score++;
                    document.getElementById('star-count').textContent = score;
                    if (score === 8) document.getElementById('win-modal').classList.remove('hidden');
                } else {
                    selectedItem.classList.remove('selected');
                    playTone(200, 0.2);
                    el.classList.add('bg-red-100');
                    setTimeout(() => el.classList.remove('bg-red-100'), 300);
                }
                selectedItem = null;
            }
        }

        function drawLine(el1, el2) {
            const r1 = el1.getBoundingClientRect();
            const r2 = el2.getBoundingClientRect();
            const svgRect = svgLayer.getBoundingClientRect();
            
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", r1.right - svgRect.left);
            line.setAttribute("y1", r1.top + r1.height/2 - svgRect.top);
            line.setAttribute("x2", r2.left - svgRect.left);
            line.setAttribute("y2", r2.top + r2.height/2 - svgRect.top);
            line.classList.add('connecting');
            svgLayer.appendChild(line);
        }

        init();
    </script>
</body>
</html>
